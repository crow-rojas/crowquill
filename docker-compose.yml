services:
  postgres:
    image: postgres:17
    ports: ["5480:5432"]
    environment:
      POSTGRES_DB: crowquill_development
      POSTGRES_USER: crowquill
      POSTGRES_PASSWORD: crowquill
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crowquill -d crowquill_development"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
