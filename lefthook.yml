pre-commit:
  parallel: true
  commands:
    rubocop:
      glob: "*.rb"
      run: bundle exec rubocop --force-exclusion {staged_files}
      stage_fixed: true
    eslint:
      glob: "*.{ts,vue,js}"
      run: bunx eslint {staged_files}
    prettier:
      glob: "*.{ts,vue,js,json,css}"
      run: bunx prettier --check {staged_files}

pre-push:
  parallel: true
  commands:
    typecheck:
      run: bun run check
    rspec:
      run: bundle exec rspec --format progress
    vitest_coverage_gate:
      run: bun run test:coverage:gate
